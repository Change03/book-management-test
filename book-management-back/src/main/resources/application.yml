server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:bookdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: http://localhost:3000
